services:
  - type: web
    name: yuexing-weather-fashion-web
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: AI_BASE_URL
        value: https://api.deepseek.com/v1
      - key: AI_MODEL
        value: deepseek-chat
